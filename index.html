<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5小程序</title>
<!-- -------------------------------------------------- ↓ style ↓ -------------------------------------------------- -->
    <style>
        /* 基础重置与排版 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* 提取自原文件的背景色 */
            background-color: rgb(237, 237, 237); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh; 
            color: rgb(0, 0, 0);
        }

        /* 移动端视图容器 */
        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px 30px;
            position: relative;
        }

        /* 标题样式 - 完全复刻 */
        .header-title {
            font-size: 26px;
            font-weight: normal;
            margin-top: 5px;
            margin-bottom: 15px;
            color: rgb(0, 0, 0);
        }

        /* 按钮组容器 */
        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 单个按钮样式 - 完全提取自原文件的内联样式 */
        .nav-btn {
            width: 250px;
            height: 50px;
            margin: 5px 0;
            padding: 0 10px;
            font-size: 20px;
            color: rgb(0, 0, 0);
            background-color: #fff;
            border: 1px solid rgb(243, 243, 243);
            border-radius: 15px; 
            box-shadow: 1px 1px 5px rgb(191, 191, 191); 
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 按钮点击时的视觉反馈 */
        .nav-btn:active {
            opacity: 0.6;
            box-shadow: none;
        }

        /* 底部信息框样式 - 对应原文件最下方的长条文字说明 */
        .footer-box {
            margin-top: auto; 
            width: 250px;
            height: 50px;
            border: 1px solid rgb(243, 243, 243);
            border-radius: 15px;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @media (min-height: 600px) {
            .footer-box {
                position: absolute;
                bottom: 40px;
            }
        }

        .footer-box p {
            color: rgb(142, 142, 142);
            font-size: 10px; /* 原文件底部文字为 10px */
            text-align: center;
        }
    </style>
<!-- -------------------------------------------------- ↑ style ↑ -------------------------------------------------- -->
</head>

<!-- -------------------------------------------------- ↓ body ↓ -------------------------------------------------- -->
<body>

    <div class="container">
        <h1 class="header-title"></h1>

        <div class="button-group">
            <a href="./start_video/start_video.html" class="nav-btn">启动按手印LED模拟</a>
            <a href="./screen/screen.html" class="nav-btn">屏幕像素计算器</a>
            <a href="./rmb/rmb.html" class="nav-btn">人民币数字转换</a>
            <a href="./color_mixer/color_mixer.html" class="nav-btn">颜色混色模拟器</a>
            <a href="./number_to_qr/number_to_qr.html" class="nav-btn">数字转二维码</a>
            <a href="./chicken_soup/chicken_soup.html" class="nav-btn">心灵（乌）鸡汤</a>
        </div>

        <div class="footer-box">
            <p>本程序均由AI完成<br>
            结果仅供参考，不保证准确性</p>
        </div>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
      }
    </script>
</body>
<!-- -------------------------------------------------- ↑ body ↑ -------------------------------------------------- -->

</html>
