<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>屏幕像素计算器</title>
    <style>
        /* 基础重置与规范 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(237, 237, 237);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column; /* 让内部元素上下垂直排列 */
            align-items: center;    /* 让内部元素水平居中 */
            justify-content: flex-start;
            min-height: 100vh;
            padding: 30px 15px;
        }

        /* 外部主标题 */
        .main-title {
            font-size: 26px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            color: #111;
            width: 100%;
        }

        /* 主体卡片容器 */
        #ratio-calculator {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 24px 20px;
            width: 100%;
            max-width: 480px;
            height: fit-content;
        }

        /* 表单组布局 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #555;
            margin-bottom: 10px;
            margin-left: 4px;
        }

        /* 预设比例按钮：使用网格布局，完美适配手机 */
        .ratio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .ratio-grid button {
            height: 44px;
            border-radius: 10px;
            border: 1px solid #eaeaea;
            background-color: #fafafa;
            color: #555;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            /* 移除移动端点击高亮 */
            -webkit-tap-highlight-color: transparent; 
        }

        .ratio-grid button:active {
            background-color: #f0f0f0;
            transform: scale(0.96);
        }

        .ratio-grid button.active {
            background-color: #007aff; /* 激活状态蓝色 */
            color: #fff;
            border-color: #007aff;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        /* 自定义比例区域 */
        .custom-ratio-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .custom-ratio-row span {
            font-weight: bold;
            color: #888;
        }

        /* 统一输入框样式 */
        input[type="number"] {
            height: 48px;
            background-color: #f4f5f7;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: all 0.2s ease;
            width: 100%;
        }

        /* 自定义比例里的小输入框居中显示 */
        .custom-ratio-row input[type="number"] {
            text-align: center;
            padding: 0 8px;
        }

        input[type="number"]:focus {
            background-color: #fff;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        /* 移动端应用按钮 */
        .apply-btn {
            height: 48px;
            padding: 0 20px;
            background-color: #2c2c2e;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
            white-space: nowrap;
        }

        .apply-btn:active {
            transform: scale(0.96);
            background-color: #1a1a1b;
        }

        /* 分割线 */
        .divider {
            height: 1px;
            background-color: #eee;
            margin: 24px 0;
            border: none;
        }

        /* ---------------- 返回按钮样式 ---------------- */
        .back-btn {
            margin-top: 20px;
            width: 250px;
            height: 50px;
            font-size: 20px;
            color: rgb(150, 150, 150);
            background-color: #fff;
            border: 1px solid rgb(243, 243, 243);
            border-radius: 15px; 
            box-shadow: 1px 1px 5px rgb(191, 191, 191); 
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }
        
        .back-btn:active { 
            background-color: #f0f0f0; 
            transform: translateY(2px);
        }

    </style>
</head>
<body>

    <h1 class="main-title">屏幕像素计算器</h1>

    <div id="ratio-calculator">
        
        <div class="form-group">
            <label>预设比例</label>
            <div class="ratio-grid" id="ratioButtons">
                <button data-ratio="16:9">16:9</button>
                <button data-ratio="4:3">4:3</button>
                <button data-ratio="9:16">9:16</button>
                <button data-ratio="3:4">3:4</button>
                <button data-ratio="1:1">1:1</button>
                <button data-ratio="21:9">21:9</button>
            </div>
        </div>

        <div class="form-group">
            <label>自定义比例</label>
            <div class="custom-ratio-row">
                <input type="number" id="customW" min="1" value="1" placeholder="宽">
                <span>:</span>
                <input type="number" id="customH" min="1" value="1" placeholder="高">
                <button class="apply-btn" onclick="applyCustomRatio()">应用</button>
            </div>
        </div>

        <hr class="divider">

        <div class="form-group">
            <label for="length">长度 (自动转为偶数)</label>
            <input type="number" id="length" min="0" placeholder="请输入长度">
        </div>
        
        <div class="form-group" style="margin-bottom: 0;">
            <label for="height">高度 (自动转为偶数)</label>
            <input type="number" id="height" min="0" placeholder="请输入高度">
        </div>

    </div>

    <a href="../index.html" class="back-btn">返回主页</a>

    <script>
        (function() {
            const container = document.getElementById('ratio-calculator');
            if (!container) return;

            const savedRatio = localStorage.getItem('lastRatio') || '16:9';
            let currentRatio = parseRatio(savedRatio);
            let isUpdating = false;
            
            // 记住用户最后修改的是哪个输入框
            let lastEdited = 'length'; 

            const lengthInput = container.querySelector('#length');
            const heightInput = container.querySelector('#height');
            const buttons = container.querySelectorAll('#ratioButtons button');

            function parseRatio(str) {
                const [w, h] = str.split(':').map(Number);
                return { w, h };
            }

            function saveRatio(ratioStr) {
                localStorage.setItem('lastRatio', ratioStr);
            }

            function setActiveButton(activeBtn) {
                buttons.forEach(b => b.classList.remove('active'));
                activeBtn.classList.add('active');
            }

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const ratioStr = btn.dataset.ratio;
                    currentRatio = parseRatio(ratioStr);
                    saveRatio(ratioStr);
                    setActiveButton(btn);
                    recalculate(); // 切换比例时，根据最后修改的框重新计算
                });
            });

            const savedBtn = Array.from(buttons).find(btn => btn.dataset.ratio === savedRatio);
            if (savedBtn) {
                savedBtn.classList.add('active');
            }

            window.applyCustomRatio = function() {
                const w = parseInt(container.querySelector('#customW').value) || 1;
                const h = parseInt(container.querySelector('#customH').value) || 1;
                const ratioStr = `${w}:${h}`;
                currentRatio = { w, h };
                saveRatio(ratioStr);
                buttons.forEach(b => b.classList.remove('active'));
                recalculate(); // 应用自定义比例时重新计算
            };

            function makeEven(num) {
                if (isNaN(num)) return num;
                const n = Math.round(num);
                return n % 2 === 0 ? n : n + 1;
            }

            function updateHeightFromLength() {
                const len = parseInt(lengthInput.value);
                if (!isNaN(len) && len >= 0) {
                    const rawHeight = (len * currentRatio.h) / currentRatio.w;
                    const height = makeEven(rawHeight);
                    heightInput.value = height;
                } else {
                    heightInput.value = '';
                }
            }

            function updateLengthFromHeight() {
                const hei = parseInt(heightInput.value);
                if (!isNaN(hei) && hei >= 0) {
                    const rawLength = (hei * currentRatio.w) / currentRatio.h;
                    const length = makeEven(rawLength);
                    lengthInput.value = length;
                } else {
                    lengthInput.value = '';
                }
            }

            // 当输入长度时
            lengthInput.addEventListener('input', () => {
                lastEdited = 'length'; // 标记最后修改的是长度
                if (!isUpdating) {
                    isUpdating = true;
                    updateHeightFromLength();
                    isUpdating = false;
                }
            });

            // 当输入高度时
            heightInput.addEventListener('input', () => {
                lastEdited = 'height'; // 标记最后修改的是高度
                if (!isUpdating) {
                    isUpdating = true;
                    updateLengthFromHeight();
                    isUpdating = false;
                }
            });

            // 重新计算逻辑，优先基于最后修改的输入框
            function recalculate() {
                if (lastEdited === 'length' && lengthInput.value !== '') {
                    updateHeightFromLength();
                } else if (lastEdited === 'height' && heightInput.value !== '') {
                    updateLengthFromHeight();
                } else if (lengthInput.value !== '') {
                    // 如果没有明确记录，但长度有值，就以长度为准
                    updateHeightFromLength();
                } else if (heightInput.value !== '') {
                    // 否则以高度为准
                    updateLengthFromHeight();
                }
            }
        })();
    </script>
</body>
</html>
