<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>财务大写金额转换器</title>
    <style>
        /* 基础重置与规范 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f6f8; /* 浅灰背景色 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 30px 15px;
        }

        /* 外部主标题 */
        .main-title {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            color: #111;
            width: 100%;
            line-height: 1.4;
        }

        .main-title span {
            font-size: 15px;
            font-weight: 400;
            color: #666;
            display: block;
            margin-top: 4px;
        }

        /* 主体卡片容器 */
        .card {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 24px 20px;
            width: 100%;
            max-width: 480px;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: #555;
            margin-bottom: 10px;
            margin-left: 4px;
        }

        /* 输入框样式 */
        input[type="text"] {
            width: 100%;
            height: 50px;
            background-color: #f4f5f7;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 18px;
            color: #333;
            font-family: "Courier New", monospace;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            background-color: #fff;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        /* 错误提示 */
        .error {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 8px;
            margin-left: 4px;
            min-height: 18px;
        }

        /* 结果展示框 */
        .result-box {
            margin-top: 15px;
            padding: 20px 16px;
            background-color: #f9f9fa;
            border-radius: 12px;
            border-left: 4px solid #34c759; /* 左侧绿色标记条 */
            min-height: 70px;
            font-size: 20px;
            font-weight: 700;
            color: #111;
            word-break: break-all;
            line-height: 1.4;
            display: flex;
            align-items: center;
        }

        /* 复制按钮 */
        .btn {
            width: 100%;
            height: 50px;
            background-color: #2c2c2e;
            color: #fff;
            border: none;
            border-radius: 25px; /* 药丸形状 */
            font-size: 17px;
            font-weight: 600;
            margin-top: 24px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 10px rgba(44, 44, 46, 0.2);
            /* 移除移动端点击高亮 */
            -webkit-tap-highlight-color: transparent; 
        }

        .btn:active {
            transform: scale(0.96);
            background-color: #1a1a1b;
        }

        /* 底部说明区 */
        .hint {
            font-size: 13px;
            color: #777;
            margin-top: 24px;
            line-height: 1.6;
            background-color: #f4f5f7;
            padding: 16px;
            border-radius: 12px;
        }

        /* 返回按钮 */
        .back-btn {
            margin-top: 20px;
            width: 250px;
            height: 50px;
            font-size: 20px;
            color: rgb(150, 150, 150);
            background-color: #fff;
            border: 1px solid rgb(243, 243, 243);
            border-radius: 15px; 
            box-shadow: 1px 1px 5px rgb(191, 191, 191); 
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        .back-btn:active { 
            background-color: #f0f0f0; 
            transform: translateY(2px);
        }

    </style>
</head>
<body>

    <h1 class="main-title">
        财务大写金额转换器
        <span>（全简体标准版）</span>
    </h1>

    <div class="card">
        <label for="amount">请输入阿拉伯数字金额：</label>
        <input type="text" id="amount" placeholder="例如：270000.00" autocomplete="off" autofocus>

        <div id="error" class="error"></div>

        <div class="result-box" id="result">（输入合法金额后自动转换）</div>

        <button class="btn" onclick="copyResult()">一键复制大写金额</button>

        <div class="hint">
            • 符合《支付结算办法》财务规范<br>
            • 使用全简体标准大写数字：零、壹、贰、叁、肆、伍、陆、柒、捌、玖<br>
            • 单位使用简体“万”“亿”<br>
            • 示例：270000 → 贰拾柒万元整
        </div>
    </div>

    <a href="../index.html" class="back-btn">返回主页</a>

    <script>
        // 全简体标准财务大写数字（中国大陆规范）
        const DIGITS = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
        const UNITS = ['', '拾', '佰', '仟'];
        const BIG_UNITS = ['', '万', '亿'];

        function convertIntegerPart(numStr) {
            if (numStr === '0') return '零';

            let reversed = numStr.split('').reverse().join('');
            let groups = [];
            for (let i = 0; i < reversed.length; i += 4) {
                groups.push(reversed.substr(i, 4).split('').reverse().join(''));
            }
            groups.reverse();

            let result = '';
            let hasNonZero = false;

            for (let i = 0; i < groups.length; i++) {
                const group = groups[i];
                const bigUnitIndex = groups.length - i - 1;
                const bigUnit = BIG_UNITS[bigUnitIndex] || '';

                let section = '';
                let hasNonZeroInSection = false;
                for (let j = 0; j < group.length; j++) {
                    const digit = parseInt(group[j], 10);
                    if (digit !== 0) {
                        if (section !== '' && section.charAt(section.length - 1) !== '零') {
                            let needZero = false;
                            for (let k = j - 1; k >= 0; k--) {
                                if (parseInt(group[k], 10) === 0) {
                                    needZero = true;
                                } else {
                                    break;
                                }
                            }
                            if (needZero) {
                                section += '零';
                            }
                        }
                        section += DIGITS[digit] + UNITS[group.length - j - 1];
                        hasNonZeroInSection = true;
                    }
                }

                if (hasNonZeroInSection) {
                    if (hasNonZero) {
                        let needZero = false;
                        for (let k = i - 1; k >= 0; k--) {
                            if (parseInt(groups[k].replace(/^0+/, '') || '0') === 0) {
                                needZero = true;
                            } else {
                                break;
                            }
                        }
                        if (needZero && result.charAt(result.length - 1) !== '零') {
                            result += '零';
                        }
                    }
                    result += section + bigUnit;
                    hasNonZero = true;
                }
            }

            if (result.startsWith('拾')) {
                result = '壹' + result;
            }

            return result || '零';
        }

        function toChineseAmount(amountStr) {
            amountStr = amountStr.trim();
            if (!/^\d+(\.\d{1,2})?$/.test(amountStr)) {
                throw new Error('请输入有效的非负金额（最多两位小数）');
            }

            let [intPart, decPart = ''] = amountStr.split('.');
            intPart = intPart.replace(/^0+/, '') || '0';
            decPart = decPart.padEnd(2, '0').slice(0, 2);

            if (intPart === '0' && decPart === '00') {
                return '零元整';
            }

            let result = convertIntegerPart(intPart) + '元';

            const jiao = parseInt(decPart[0], 10);
            const fen = parseInt(decPart[1], 10);

            if (jiao > 0) result += DIGITS[jiao] + '角';
            if (fen > 0) result += DIGITS[fen] + '分';

            if (jiao === 0 && fen === 0) {
                result += '整';
            }

            return result;
        }

        const inputEl = document.getElementById('amount');
        const resultEl = document.getElementById('result');
        const errorEl = document.getElementById('error');

        inputEl.addEventListener('input', () => {
            const val = inputEl.value;
            errorEl.textContent = '';
            if (val.trim() === '') {
                resultEl.textContent = '（输入合法金额后自动转换）';
                return;
            }
            try {
                const chinese = toChineseAmount(val);
                resultEl.textContent = chinese;
            } catch (e) {
                resultEl.textContent = '（输入合法金额后自动转换）';
                errorEl.textContent = e.message;
            }
        });

        function copyResult() {
            const text = resultEl.textContent;
            if (text.includes('（输入')) {
                alert('请先输入有效金额');
                return;
            }
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ 已复制：\n' + text);
                }).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('✅ 已复制：\n' + text);
        }
    </script>

</body>
</html>
