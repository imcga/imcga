<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毒鸡汤 - 每日一扎</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png" type="image/png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(237, 237, 237); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh; 
            color: rgb(0, 0, 0);
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 30px;
            position: relative;
        }

        .quote-box {
            width: 100%;
            min-height: 250px; 
            display: flex;
            /* 改为 flex-start 让整体靠左对齐，如果想居中偏左可以留着 center */
            justify-content: flex-start; 
            align-items: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .quote-text {
            font-size: 24px;
            line-height: 1.6;
            color: #333;
            font-weight: 500;
            /* 重点修改：文字左对齐 */
            text-align: left; 
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        .quote-text.fade-out {
            opacity: 0;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; 
        }

        .nav-btn {
            width: 250px;
            height: 50px;
            padding: 0 10px;
            font-size: 20px;
            color: rgb(142, 142, 142);
            background-color: transparent;
            border: 1px solid rgb(243, 243, 243);
            border-radius: 15px; 
            box-shadow: 1px 1px 5px rgb(191, 191, 191); 
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            
            /* 重点保留：按钮内部元素居中对齐 */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            outline: none;
        }

        .nav-btn:active {
            opacity: 0.6;
            box-shadow: none;
        }
        
        .primary-btn {
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="quote-box">
            <div id="quote-text" class="quote-text">正在熬制鸡汤...</div>
        </div>

        <div class="button-group">
            <button id="refresh-btn" class="nav-btn primary-btn">再干一碗</button>
            <a href="../index.html" class="nav-btn">返回主页</a>
        </div>

    </div>

    <script src="data.js"></script>

    <script>
        const quoteElement = document.getElementById('quote-text');
        const refreshBtn = document.getElementById('refresh-btn');

        function generateQuote() {
            quoteElement.classList.add('fade-out');

            setTimeout(() => {
                // 这里的 soulQuotes 就是从 data.js 里读取出来的
                const randomIndex = Math.floor(Math.random() * soulQuotes.length);
                quoteElement.innerText = soulQuotes[randomIndex];
                
                quoteElement.classList.remove('fade-out');
            }, 300);
        }

        refreshBtn.addEventListener('click', generateQuote);
        window.onload = generateQuote;
    </script>
</body>
</html>
